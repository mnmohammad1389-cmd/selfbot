<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربات سلف تایم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            overflow: hidden;
            position: relative;
        }

        /* ===== پس‌زمینه سه‌بعدی متحرک ===== */
        .bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 50%, #0f0f1f 100%);
        }

        .bg-3d::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(72, 187, 120, 0.08) 0%, transparent 40%);
            animation: rotateBg 60s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* ===== ذرات پس‌زمینه ===== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== کانتینر اصلی ===== */
        .container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 50px;
            max-width: 480px;
            width: 100%;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform: perspective(1000px) rotateX(5deg) rotateY(-2deg);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .container:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1.02);
        }

        /* ===== هدر ===== */
        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .header .icon-3d {
            display: inline-block;
            font-size: 4em;
            margin-bottom: 10px;
            animation: floatIcon 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(102, 126, 234, 0.3));
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0px) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .header h1 {
            color: #fff;
            font-size: 2em;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
            letter-spacing: 1px;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85em;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* ===== باکس وضعیت سه‌بعدی ===== */
        .status-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 35px 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: perspective(600px) rotateX(2deg);
        }

        .status-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .status-box.active {
            border-color: rgba(40, 167, 69, 0.3);
            box-shadow: 0 0 40px rgba(40, 167, 69, 0.1), inset 0 0 40px rgba(40, 167, 69, 0.05);
        }

        .status-box.active::before {
            opacity: 1;
        }

        .status-box.inactive {
            border-color: rgba(220, 53, 69, 0.2);
            box-shadow: 0 0 40px rgba(220, 53, 69, 0.05);
        }

        .status-box .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(60px);
            opacity: 0.2;
            transition: all 0.5s;
        }

        .status-box.active .glow {
            background: radial-gradient(circle, #28a745 0%, transparent 70%);
            opacity: 0.3;
        }

        .status-box.inactive .glow {
            background: radial-gradient(circle, #dc3545 0%, transparent 70%);
            opacity: 0.1;
        }

        .status-icon {
            font-size: 4.5em;
            display: block;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .status-box.active .status-icon {
            animation: pulseIcon 2s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .status-text {
            font-size: 1.8em;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }

        .status-text.active {
            color: #28a745;
            text-shadow: 0 0 30px rgba(40, 167, 69, 0.3);
        }

        .status-text.inactive {
            color: #dc3545;
            text-shadow: 0 0 30px rgba(220, 53, 69, 0.2);
        }

        .bot-name {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85em;
            margin-top: 8px;
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        /* ===== دکمه‌های سه‌بعدی ===== */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 140px;
            padding: 16px 30px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Vazirmatn', 'Segoe UI', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            color: #fff;
            letter-spacing: 0.5px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        button:hover:not(:disabled)::after {
            opacity: 1;
        }

        .btn-activate {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            box-shadow: 
                0 8px 30px rgba(40, 167, 69, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: perspective(600px) rotateX(0deg) translateY(0);
        }

        .btn-activate:hover:not(:disabled) {
            transform: perspective(600px) rotateX(-4deg) translateY(-4px) scale(1.02);
            box-shadow: 
                0 15px 45px rgba(40, 167, 69, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-activate:active:not(:disabled) {
            transform: perspective(600px) rotateX(0deg) translateY(0) scale(0.98);
        }

        .btn-deactivate {
            background: linear-gradient(135deg, #dc3545 0%, #e74c6f 100%);
            box-shadow: 
                0 8px 30px rgba(220, 53, 69, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: perspective(600px) rotateX(0deg) translateY(0);
        }

        .btn-deactivate:hover:not(:disabled) {
            transform: perspective(600px) rotateX(-4deg) translateY(-4px) scale(1.02);
            box-shadow: 
                0 15px 45px rgba(220, 53, 69, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-deactivate:active:not(:disabled) {
            transform: perspective(600px) rotateX(0deg) translateY(0) scale(0.98);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: perspective(600px) rotateX(0deg) scale(0.95) !important;
            box-shadow: none !important;
        }

        /* ===== لودینگ ===== */
        .btn-loading {
            color: transparent !important;
            position: relative;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 28px;
            height: 28px;
            top: 50%;
            left: 50%;
            margin-left: -14px;
            margin-top: -14px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== پیام ===== */
        .message {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 14px;
            display: none;
            font-weight: 600;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.success {
            display: block;
            background: rgba(40, 167, 69, 0.15);
            color: #7ddfa0;
            border-color: rgba(40, 167, 69, 0.2);
        }

        .message.error {
            display: block;
            background: rgba(220, 53, 69, 0.15);
            color: #f8a5b5;
            border-color: rgba(220, 53, 69, 0.2);
        }

        .message.info {
            display: block;
            background: rgba(102, 126, 234, 0.15);
            color: #a8b5f0;
            border-color: rgba(102, 126, 234, 0.2);
        }

        /* ===== فوتر ===== */
        .footer {
            margin-top: 25px;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        /* ===== ریسپانسیو ===== */
        @media (max-width: 500px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
                transform: perspective(1000px) rotateX(2deg) rotateY(0deg) !important;
            }

            .container:hover {
                transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1) !important;
            }

            button {
                min-width: 100%;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .status-icon {
                font-size: 3.5em;
            }

            .status-text {
                font-size: 1.4em;
            }

            .header .icon-3d {
                font-size: 3em;
            }
        }

        @media (max-width: 380px) {
            .container {
                padding: 20px 15px;
            }

            .status-box {
                padding: 25px 15px;
            }

            .status-icon {
                font-size: 3em;
            }

            .status-text {
                font-size: 1.2em;
            }

            button {
                font-size: 15px;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== پس‌زمینه سه‌بعدی ===== -->
    <div class="bg-3d"></div>

    <!-- ===== ذرات ===== -->
    <div class="particles" id="particles"></div>

    <!-- ===== کانتینر اصلی ===== -->
    <div class="container">
        <!-- هدر -->
        <div class="header">
            <span class="icon-3d"></span>
            <h1>کنترل ربات</h1>
            <p class="subtitle">✦ فعال یا غیرفعال کردن ✦</p>
        </div>

        <!-- وضعیت -->
        <div class="status-box inactive" id="statusBox">
            <div class="glow"></div>
            <span class="status-icon" id="statusIcon">⭕</span>
            <div class="status-text inactive" id="statusText">غیرفعال</div>
            <div class="bot-name" id="botName">ربات متصل نیست</div>
        </div>

        <!-- دکمه‌ها -->
        <div class="button-group">
            <button class="btn-activate" id="activateBtn" onclick="activateBot()">
                ✦ فعال‌سازی
            </button>
            <button class="btn-deactivate" id="deactivateBtn" onclick="deactivateBot()" disabled>
                ✦ قطع کردن
            </button>
        </div>

        <!-- پیام -->
        <div id="message" class="message"></div>

        <!-- فوتر -->
        <div class="footer">
            ⚡ وضعیت در مرورگر ذخیره میشود
        </div>
    </div>

    <script>
        // =====================================================
        // 🔑 توکن ربات خود را اینجا وارد کنید
        // =====================================================
        const BOT_TOKEN = "8988496067:AAGHldE3ZwBdKUFUeXWrJtBfZDM1-ye0oHY";
        // =====================================================

        // ===== متغیرها =====
        let isActive = false;
        let botInfo = null;

        // ===== ساخت ذرات =====
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 30;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 20) + 's';
                particle.style.opacity = Math.random() * 0.3 + 0.1;
                container.appendChild(particle);
            }
        }

        // ===== بارگذاری وضعیت ذخیره شده =====
        function loadState() {
            const savedStatus = localStorage.getItem('botActive_3d');
            
            if (savedStatus === 'true') {
                isActive = true;
                checkBotStatus();
            } else {
                updateUI();
            }
        }

        // ===== به‌روزرسانی UI =====
        function updateUI() {
            const statusBox = document.getElementById('statusBox');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            const botName = document.getElementById('botName');
            const activateBtn = document.getElementById('activateBtn');
            const deactivateBtn = document.getElementById('deactivateBtn');

            if (isActive && botInfo) {
                statusBox.className = 'status-box active';
                statusIcon.textContent = '✅';
                statusText.textContent = 'فعال';
                statusText.className = 'status-text active';
                botName.textContent = `ربات: ${botInfo.first_name} (${botInfo.username})`;
                activateBtn.disabled = true;
                deactivateBtn.disabled = false;
            } else if (isActive && !botInfo) {
                statusBox.className = 'status-box active';
                statusIcon.textContent = '⏳';
                statusText.textContent = 'در حال اتصال...';
                statusText.className = 'status-text';
                botName.textContent = 'در حال بررسی...';
                activateBtn.disabled = true;
                deactivateBtn.disabled = true;
            } else {
                statusBox.className = 'status-box inactive';
                statusIcon.textContent = '⭕';
                statusText.textContent = 'غیرفعال';
                statusText.className = 'status-text inactive';
                botName.textContent = 'ربات متصل نیست';
                activateBtn.disabled = false;
                deactivateBtn.disabled = true;
            }

            // ذخیره وضعیت
            localStorage.setItem('botActive_3d', isActive);
        }

        // ===== نمایش پیام =====
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            
            setTimeout(() => {
                msg.className = 'message';
            }, 5000);
        }

        // ===== بررسی وضعیت ربات =====
        async function checkBotStatus() {
            if (!BOT_TOKEN || BOT_TOKEN === "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
                showMessage('❌ لطفاً توکن ربات را در کد قرار دهید!', 'error');
                isActive = false;
                botInfo = null;
                updateUI();
                return false;
            }

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    botInfo = data.result;
                    showMessage(`✅ ربات ${botInfo.first_name} متصل شد!`, 'success');
                    updateUI();
                    return true;
                } else {
                    showMessage('❌ توکن اشتباه است یا ربات وجود ندارد!', 'error');
                    isActive = false;
                    botInfo = null;
                    updateUI();
                    return false;
                }
            } catch (error) {
                showMessage('❌ خطا در ارتباط با سرور تلگرام!', 'error');
                return false;
            }
        }

        // ===== فعال‌سازی =====
        async function activateBot() {
            if (!BOT_TOKEN || BOT_TOKEN === "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
                showMessage('❌ لطفاً توکن ربات را در کد قرار دهید!', 'error');
                return;
            }

            const activateBtn = document.getElementById('activateBtn');
            activateBtn.disabled = true;
            activateBtn.classList.add('btn-loading');

            const success = await checkBotStatus();
            
            if (success) {
                isActive = true;
                updateUI();
                
                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: 'me',
                            text: '✅ ربات فعال شد!'
                        })
                    });
                    showMessage('✅ ربات با موفقیت فعال شد!', 'success');
                } catch (error) {
                    showMessage('⚠️ ربات فعال شد اما پیام ارسال نشد', 'info');
                }
            } else {
                isActive = false;
                updateUI();
            }

            activateBtn.disabled = false;
            activateBtn.classList.remove('btn-loading');
        }

        // ===== قطع کردن =====
        async function deactivateBot() {
            const deactivateBtn = document.getElementById('deactivateBtn');
            deactivateBtn.disabled = true;
            deactivateBtn.classList.add('btn-loading');

            try {
                if (BOT_TOKEN && BOT_TOKEN !== "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: 'me',
                            text: '❌ ربات قطع شد!'
                        })
                    });
                }

                isActive = false;
                botInfo = null;
                updateUI();
                showMessage('❌ ربات با موفقیت قطع شد!', 'error');
                
            } catch (error) {
                isActive = false;
                botInfo = null;
                updateUI();
                showMessage('❌ ربات قطع شد!', 'error');
            }

            deactivateBtn.disabled = false;
            deactivateBtn.classList.remove('btn-loading');
        }

        // ===== بارگذاری خودکار =====
        window.onload = function() {
            createParticles();
            
            if (!BOT_TOKEN || BOT_TOKEN === "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz") {
                showMessage('⚠️ لطفاً توکن ربات را در کد قرار دهید!', 'error');
                document.getElementById('activateBtn').disabled = true;
            } else {
                loadState();
            }

            console.log('کنترل ربات سه‌بعدی');
            console.log('📌 توکن:', BOT_TOKEN ? '✅ تنظیم شده' : '❌ تنظیم نشده');
        };
    </script>
</body>
</html>
